name: Execução de testes dos artefatos de Backend do projeto

on:
  workflow_call:

jobs:
  test-backend:
    name: Execute Unit tests for Backend Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests of Module
        run: mvn -B -f ./pom.xml test

      - name: Run Verify to Module
        run: mvn -B -f ./pom.xml verify
      
      - name: Run Code Quality Analysis
        run: mvn -B -f ./pom.xml jacoco:report

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ./target/site/jacoco/
          retention-days: 1
