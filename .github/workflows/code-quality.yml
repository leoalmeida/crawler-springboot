name: Code Quality Analysis for Backend Module

on:
  workflow_call:

jobs:
  code-quality-backend:
    name: Lint Backend Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run Spotless to fix patterns
        run: mvn -B -f ./pom.xml spotless:apply

      - name: Compile Backend Module
        run: mvn -B -f ./pom.xml clean package -DskipTests

      - name: Run Checkstyle
        run: mvn -B -f ./pom.xml checkstyle:check

      - name: Generate Checkstyle report
        run: mvn -B -f ./pom.xml checkstyle:checkstyle

      - name: Run PMD check
        run: mvn -B -f ./pom.xml pmd:check

      - name: Generate PMD report
        run: mvn -B -f ./pom.xml pmd:pmd
      
      - name: Run SpotBugs check
        run: mvn -B -f ./pom.xml spotbugs:check

      - name: Generate SpotBugs report
        run: mvn -B -f ./pom.xml spotbugs:spotbugs
        